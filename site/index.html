
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randi Bäckmark — Hei, Fiken!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--t1:#409f89;--t2:#2d7a68;--t3:#e3f4f0;--black:#111;--white:#fff;--bg:#F7F7F5;--card:#fff;--muted:#333;--font:'Nunito Sans','Myriad Pro',sans-serif}
body{font-family:var(--font);font-size:16px;color:var(--black);background:var(--bg);line-height:1.7}
nav{position:sticky;top:0;z-index:100;background:var(--white);display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:62px;box-shadow:0 1px 0 rgba(0,0,0,.07)}
.nav-logo{font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--black)}
.nav-logo span{color:var(--t1)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--t1)}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.burger span{display:block;width:22px;height:2px;background:var(--black);border-radius:2px}

/* HERO */
.hero-outer{width:100%;background:#111;padding:48px 0}
.hero-inner{max-width:1060px;margin:0 auto;padding:0 48px}
.hero-video{width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:#000}
.hero-video iframe{width:100%;height:100%;border:none;display:block}
.hero-contact{display:flex;gap:28px;flex-wrap:wrap;padding:24px 0 8px;align-items:center}
.hero-contact-link{display:flex;align-items:center;gap:10px;text-decoration:none;color:rgba(255,255,255,.8);font-size:14px;transition:color .2s}
.hero-contact-link:hover{color:#fff}
.hero-contact-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hero-contact-icon svg{width:15px;height:15px;stroke:var(--t1);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.wrap{max-width:1060px;margin:0 auto;padding:0 48px}
.section{padding:36px 0}
.section-eyebrow{font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--t1);margin-bottom:8px}
.section-title{font-size:28px;font-weight:700;margin-bottom:8px}
.section-intro{font-size:16px;color:var(--muted);line-height:1.7;margin-bottom:20px}

/* FAQ — direkte synlig */
.faq-section{background:var(--white);padding:0 0 32px}
.faq-list{max-width:1060px;margin:0 auto;padding:0 48px}
.faq-item{border-bottom:1px solid rgba(0,0,0,.07)}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:20px 0;cursor:pointer;gap:16px;font-size:17px;font-weight:700;transition:color .2s;color:var(--black)}
.faq-q:hover{color:var(--t1)}
.faq-q-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.faq-type-icon{flex-shrink:0;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:#B8E5D9}
.faq-type-icon svg{width:13px;height:13px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;stroke:#409f89}.faq-type-icon.video-filled svg{fill:#409f89;stroke:none}
.faq-q-text{flex:1}
.faq-chevron{width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .3s}
.faq-item.open .faq-chevron{background:var(--t1);transform:rotate(180deg)}
.faq-chevron svg{width:12px;height:12px;stroke:var(--muted);fill:none;stroke-width:2.5;stroke-linecap:round;transition:stroke .2s}
.faq-item.open .faq-chevron svg{stroke:#fff}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease}
.faq-item.open .faq-a{max-height:2000px}
.faq-a-inner{padding:4px 0 28px 40px;font-size:15px;color:var(--muted);line-height:1.8}

/* CAROUSEL */
.carousel{border-radius:10px;overflow:hidden;background:var(--bg);margin-top:12px}
.carousel-track{display:flex;transition:transform .4s cubic-bezier(.25,1,.5,1)}
.carousel-slide{min-width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;overflow:hidden}
.carousel-slide img{width:100%;height:100%;object-fit:cover}
.carousel-slide iframe{width:100%;height:100%;border:none}
.slide-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.slide-num{font-size:32px;font-weight:300;color:var(--t1)}
.slide-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.car-controls{display:flex;align-items:center;gap:10px;margin-top:10px}
.car-btn{width:30px;height:30px;border-radius:50%;background:var(--card);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.car-btn:hover{background:var(--t1)}
.car-btn:hover svg path{stroke:#fff}
.car-dots{display:flex;gap:5px;flex:1}
.car-dot{width:6px;height:6px;border-radius:3px;background:#ddd;cursor:pointer;transition:background .2s,width .25s}
.car-dot.active{width:16px;background:var(--t1)}
.car-count{font-size:11px;color:var(--muted);white-space:nowrap}

/* WORK */


/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
.timeline-wrap{background:var(--card);border-radius:14px;padding:36px}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:4px;top:6px;bottom:0;width:2px;background:var(--t3);border-radius:2px}
.tl-item{position:relative;margin-bottom:28px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-24px;top:7px;width:10px;height:10px;border-radius:50%;background:var(--t1);border:2px solid var(--white)}
.tl-year{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--t2);margin-bottom:2px}
.tl-role{font-size:16px;font-weight:700}
.tl-place{font-size:14px;color:#333;margin-bottom:4px}
.tl-desc{font-size:15px;color:#333;line-height:1.6}
.skills-wrap{background:var(--card);border-radius:14px;padding:36px}
.skill-row{margin-bottom:18px}
.skill-row:last-child{margin-bottom:0}
.skill-name{font-size:14px;font-weight:700;margin-bottom:6px}
.skill-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.skill-fill{height:100%;background:linear-gradient(90deg,var(--t1),var(--t2));width:0;border-radius:3px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}

/* KONTAKT */
.kontakt-section{background:var(--white);padding:80px 0}
.kontakt-grid{display:grid;grid-template-columns:280px 1fr;gap:64px;align-items:start}
.kontakt-bilde{border-radius:14px;overflow:hidden;aspect-ratio:3/4;background:var(--t3);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;letter-spacing:.1em;text-transform:uppercase;max-width:280px}
.kontakt-bilde img{width:100%;height:100%;object-fit:cover}
.kontakt-info{display:flex;flex-direction:column;gap:32px}
.kontakt-links{display:flex;flex-direction:column;gap:14px}
.kontakt-link{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--black);font-size:15px;transition:color .2s}
.kontakt-link:hover{color:var(--t1)}
.kontakt-link-icon{width:36px;height:36px;border-radius:9px;background:var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kontakt-link-icon svg{width:16px;height:16px;stroke:var(--t1);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

footer{background:var(--black);color:rgba(255,255,255,.4);padding:28px 48px;display:flex;justify-content:space-between;align-items:center;font-size:13px;flex-wrap:wrap;gap:8px}
footer strong{color:var(--t1)}
footer a{color:rgba(255,255,255,.4);text-decoration:none}
footer a:hover{color:var(--t1)}
.fade-in{opacity:0;transform:translateY(12px);transition:opacity .6s,transform .6s}
.fade-in.visible{opacity:1;transform:none}

@media(max-width:900px){.work-grid{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr;gap:24px}.kontakt-grid{grid-template-columns:1fr;gap:40px}.kontakt-bilde{aspect-ratio:4/3;max-width:300px}}
@media(max-width:640px){nav{padding:0 20px}.wrap{padding:0 20px}.faq-list{padding:0 20px}.hero-inner{padding:0 20px}.nav-links{display:none;flex-direction:column;position:absolute;top:62px;left:0;right:0;background:#fff;padding:16px 20px;gap:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}.nav-links.open{display:flex}.burger{display:flex}.section{padding:36px 0}.faq-section{padding:48px 0}.work-grid{grid-template-columns:1fr}.kontakt-section{padding:48px 0}footer{padding:24px 20px}.faq-a-inner{padding-left:0}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">Randi Bäckmark<span>.</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="#qa">Q&A</a></li>
    <li><a href="#erfaring">Erfaring</a></li>
  </ul>
  <div class="burger" onclick="document.getElementById('navLinks').classList.toggle('open')"><span></span><span></span><span></span></div>
</nav>

<!-- HERO -->
<div class="hero-outer">
  <div class="hero-inner">
    <div class="hero-video">
      <iframe
        src="https://www.youtube.com/embed/nHy4ph_fxHY?rel=0&modestbranding=1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
    <div class="hero-contact" id="heroContact"></div>
  </div>
</div>

<!-- Q&A INTRO + FAQ -->
<div class="faq-section" id="qa">
  <div class="wrap" style="padding-top:56px;padding-bottom:24px">
    <div class="section-title" style="margin-bottom:12px">Finn ut så mye eller lite dere vil om meg her</div>
    <div class="section-intro" style="white-space:normal">…men please se på de fine videoene og tekstene tidligere kollegaer og familie har bidratt med da. 🙏</div>
  </div>
  <div class="faq-list" id="faqList"></div>
</div>

<!-- ERFARING + FERDIGHETER -->
<div class="wrap" id="erfaring">
  <div class="section">
    <div class="two-col">
      <div>
        <div class="section-eyebrow">Arbeidserfaring</div>
        <div class="section-title">Tidslinje</div>
        <div class="timeline-wrap"><div class="timeline" id="timeline"></div></div>
      </div>
      <div>
        <div class="section-eyebrow">Verktøy</div>
        <div class="section-title">Ferdigheter</div>
        <div class="skills-wrap" id="skillsWrap"><div id="skillsGrid"></div></div>
      </div>
    </div>
  </div>
</div>





<footer>
  <div>&copy; 2025 <strong>Randi Bäckmark</strong> — Grafisk designer</div>
  <div><a href="mailto:backmarkrandi@gmail.com">backmarkrandi@gmail.com</a></div>
</footer>

<script src="data.js"></script>
<script>

// Hero video embedded directly

// ── CAROUSEL ──
const carState={};
function makeCarousel(items,id){
  carState[id]={total:items.length,current:0};
  const slides=items.map((item,i)=>{
    if(item.type==='image') return`<div class="carousel-slide"><img src="${item.src}" alt="${item.label||''}"></div>`;
    if(item.type==='video'&&item.vimeoId) return`<div class="carousel-slide"><iframe src="https://player.vimeo.com/video/${item.vimeoId}?badge=0&autopause=0&title=0&byline=0&portrait=0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div>`;
    if(item.type==='youtube'&&item.youtubeId) return`<div class="carousel-slide"><iframe src="https://www.youtube.com/embed/${item.youtubeId}?rel=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
    return`<div class="carousel-slide"><div class="slide-placeholder" style="background:${item.bg||'#e3f4f0'}"><div class="slide-num">${String(i+1).padStart(2,'0')}</div><div class="slide-lbl">${item.label||''}</div></div></div>`;
  }).join('');
  const dots=items.map((_,i)=>`<div class="car-dot${i===0?' active':''}" onclick="goSlide('${id}',${i})"></div>`).join('');
  const controls=items.length>1?`<div class="car-controls"><button class="car-btn" onclick="stepSlide('${id}',-1)"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="car-dots" id="${id}dots">${dots}</div><button class="car-btn" onclick="stepSlide('${id}',1)"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="car-count" id="${id}count">1 / ${items.length}</div></div>`:'';
  return`<div class="carousel" id="${id}"><div class="carousel-track" id="${id}track">${slides}</div></div>${controls}`;
}
function goSlide(id,idx){carState[id].current=idx;document.getElementById(id+'track').style.transform=`translateX(-${idx*100}%)`;document.querySelectorAll(`#${id}dots .car-dot`).forEach((d,i)=>d.classList.toggle('active',i===idx));document.getElementById(id+'count').textContent=`${idx+1} / ${carState[id].total}`}
function stepSlide(id,dir){const s=carState[id];goSlide(id,(s.current+dir+s.total)%s.total)}

// ── FAQ ──
const fikenQA = [
  {
    q: "Så… hvem er du da?",
    type: "video",
    text: "Jeg er Randi. Erfaren og allsidig grafisk designer. Kreativ. Humørfylt. Leken. Nyskjerrig. Arbeidsom. Positiv. Og mamma, kjæreste og hundeeier.<br><br>Lær mer om meg her, i denne animasjonsvideoen jeg har laget:",
    media: [{type:"video", vimeoId:"1187345684", label:"Showcase"}]
  },
  {
    q: "Og hvorfor søker du på denne jobben?",
    type: "text",
    text: "Altså, den stillingsannonsen deres traff meg virkelig. Jeg digger måten dere tenker på om at det man holder på med skal være gøy, at man selv har ansvar for å se hva som trengs å gjøres, at det er rom for å teste nye ting, og alt det. Dere virker som en herlig gjeng, og at det er uhøytidelig og høyt under taket på jobb, er noe jeg setter stor pris på.<br><br>Og så kan jeg gjøre alt det dere etterspør! Med erfaring fra både in-house byrå og markedsavdeling, har jeg call på dette med å bygge merkevare, altså!",
    media: []
  },
  {
    q: "Hva sier andre om deg?",
    type: "video",
    text: "Jeg har spurt litt rundt, jeg. Her er hva tidligere kollegaer og familie sier om meg:",
    media: [] // Legg inn vimeoId-er her
  },
  {
    q: "Er du rå på regnskap da?",
    type: "text",
    text: "Hehe, nei… På russekortet mitt sto det: <em>«Det finnes tre typer mennesker her i verden. De som kan telle, og de som ikke kan det»</em>. Så jeg er jo akkurat den type mennesker som absolutt trenger Fiken! Så da kan jeg jo sette meg lett inn i hva man trenger hjelp med, og forsøke å forklare det til nettopp sånne som meg. Jeg liker å visualisere komplekse ting, så de blir lettere å forstå.",
    media: []
  },
  {
    q: "Er du god til å designe annonser?",
    type: "text",
    text: "Ja! Det har jeg masse erfaring med fra tiden min i VG, der det var alt vi gjorde, lage kreative annonser for VG sine annonsører. Og så har jeg laget mye markedsmateriell i Allente også, for mange ulike kanaler.",
    media: [{type:"youtube", youtubeId:"SPDlenG0axc"}]
  },
  {
    q: "Hva annet kan du?",
    type: "text",
    text: "Jeg kan klippe video, lage enkle animasjoner, illustrere, redigere bilder, lage konsepter, idémyldre, holde workshops, lage innsalgspresentasjoner, og mye mer. Og jeg deler gjerne musikktips og hjelper til å orge festligheter. 🎉 Og så klarer jeg ta tunga opp på nesa.",
    media: []
  },
  {
    q: "Hvor god er du på Figma?",
    type: "text",
    text: "Jeg har laget litt annonser og annen grafikk i Figma, men har mer erfaring med å sette det opp i Photoshop, Bannerflow, eller direkte i samarbeid med utviklere (om det skulle være noe mer avansert). Men jeg synes det er gøy å lære nye programmer, og har ingen problemer med å lage annonser i Figma. Det er jo hva man fyller en annonserute med som betyr noe, og designe — det kan jeg!",
    media: []
  },
  {
    q: "Kan vi se noen arbeider du har gjort?",
    type: "text",
    text: "Sure! Ta en titt på porteføljesiden min. Den ligger her: <a href='https://randback.portfoliobox.net/' target='_blank' style='color:var(--t1)'>randback.portfoliobox.net</a>",
    media: []
  },
  {
    q: "Hvordan kontakter vi deg?",
    type: "text",
    text: "Jeg sier som Gabrielle... <em>«Riiing meg»</em>. 97 72 03 15. Eller send en mail til backmarkrandi@gmail.com<br><br>Håper å høre fra dere! 🤞<br><br><a href='https://open.spotify.com/track/5YMptWDgTevTRMyKGtR4Gv' target='_blank' style='display:inline-flex;align-items:center;gap:8px;background:#1DB954;color:#fff;text-decoration:none;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;letter-spacing:.04em'><svg width='16' height='16' viewBox='0 0 24 24' fill='white'><path d='M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z'/></svg> Ring meg — Gabrielle</a>",
    media: []
  },
  {
    q: "Hvordan slengte du sammen denne siden?",
    type: "text",
    text: "Vel, slengte og slengte… Claude og jeg har jobbet hardt med den, men det har vært skikkelig lærerikt også. Og nå håper jeg at dere skjønner at jeg har skikkelig lyst på å jobbe hos dere, siden jeg har lagt ned mye jobb. 😄",
    media: []
  }
];

const typeIcons={
  video:`<div class="faq-type-icon"><svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7" fill="#409f89" stroke="none"/><rect x="1" y="5" width="15" height="14" rx="2" fill="#409f89" stroke="none"/></svg></div>`,
  sample:`<div class="faq-type-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`,
  text:`<div class="faq-type-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/></svg></div>`
};

function buildFaq(){
  const list = document.getElementById('faqList');
  list.innerHTML = fikenQA.map(item => {
    const cid = 'c'+Math.random().toString(36).slice(2,7);
    let content = `<div class="faq-a-inner">${item.text||''}`;
    if(item.media && item.media.length) content += makeCarousel(item.media, cid);
    content += '</div>';
    return `<div class="faq-item">
      <div class="faq-q" onclick="toggleFaq(this)">
        <div class="faq-q-left">
          ${typeIcons[item.type]||''}
          <span class="faq-q-text">${item.q}</span>
        </div>
        <div class="faq-chevron"><svg viewBox="0 0 12 12"><path d="M2 4l4 4 4-4"/></svg></div>
      </div>
      <div class="faq-a">${content}</div>
    </div>`;
  }).join('');
}

function toggleFaq(btn){btn.parentElement.classList.toggle('open')}

// ── WORK ──
function buildWork(){
  if(!document.getElementById('workGrid')) return;
  document.getElementById('workGrid').innerHTML=SITE_DATA.selectedWork.map(w=>`
    <a class="work-card fade-in" href="${w.url||'#'}" target="_blank">
      <div class="work-thumb" style="background:${w.bg||'#e3f4f0'}">
        ${w.image?`<img src="${w.image}" alt="${w.title}">`:`<span>${w.title}</span>`}
      </div>
      <div class="work-info">
        <div class="work-title">${w.title}</div>
        <div class="work-desc">${w.desc}</div>
        <div class="work-link">Se prosjekt →</div>
      </div>
    </a>`).join('');
  if(SITE_DATA.portfolioUrl){
    const wrap=document.getElementById('portfolioLinkWrap');
    const link=document.getElementById('portfolioLink');
    wrap.style.display='block';
    link.href=SITE_DATA.portfolioUrl;
    link.textContent=SITE_DATA.portfolioUrl.replace(/^https?:\/\//,'');
  }
}

// ── TIMELINE ──
function buildTimeline(){
  document.getElementById('timeline').innerHTML=SITE_DATA.timeline.map(t=>`
    <div class="tl-item fade-in">
      <div class="tl-dot"></div>
      <div class="tl-year">${t.year}</div>
      <div class="tl-role">${t.role}</div>
      <div class="tl-place">${t.place}</div>
      <div class="tl-desc">${t.desc}</div>
    </div>`).join('');
}

// ── SKILLS ──
function buildSkills(){
  document.getElementById('skillsGrid').innerHTML=SITE_DATA.skills.map(s=>`
    <div class="skill-row">
      <div class="skill-name">${s.name}</div>
      <div class="skill-track"><div class="skill-fill" data-p="${s.pct}"></div></div>
    </div>`).join('');
}

// ── KONTAKT ──
function buildKontakt(){
  if(!document.getElementById('kontaktBilde')) return;
  if(SITE_DATA.contactImage) document.getElementById('kontaktBilde').innerHTML=`<img src="${SITE_DATA.contactImage}" alt="${SITE_DATA.name}">`;
  const links=[];
  if(SITE_DATA.email) links.push(`<a class="kontakt-link" href="mailto:${SITE_DATA.email}"><div class="kontakt-link-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>${SITE_DATA.email}</a>`);
  if(SITE_DATA.phone) links.push(`<a class="kontakt-link" href="tel:${SITE_DATA.phone}"><div class="kontakt-link-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.59 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.78a16 16 0 0 0 6.29 6.29l1.42-1.42a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>${SITE_DATA.phone}</a>`);
  if(SITE_DATA.linkedin) links.push(`<a class="kontakt-link" href="${SITE_DATA.linkedin}" target="_blank"><div class="kontakt-link-icon"><svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></div>LinkedIn</a>`);
  if(SITE_DATA.portfolioUrl) links.push(`<a class="kontakt-link" href="${SITE_DATA.portfolioUrl}" target="_blank"><div class="kontakt-link-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>Portefølje</a>`);
  document.getElementById('kontaktLinks').innerHTML=links.join('');
}

// ── HERO CONTACT ──
function buildHeroContact(){
  const c = document.getElementById('heroContact');
  if(!c) return;
  const links = [];
  if(SITE_DATA.email) links.push(`<a class="hero-contact-link" href="#"><div class="hero-contact-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>${SITE_DATA.email}</a>`);
  if(SITE_DATA.phone) links.push(`<a class="hero-contact-link" href="tel:${SITE_DATA.phone}"><div class="hero-contact-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.59 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.78a16 16 0 0 0 6.29 6.29l1.42-1.42a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>${SITE_DATA.phone}</a>`);
  if(SITE_DATA.linkedin) links.push(`<a class="hero-contact-link" href="${SITE_DATA.linkedin}" target="_blank"><div class="hero-contact-icon"><svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></div>LinkedIn</a>`);
  if(SITE_DATA.portfolioUrl) links.push(`<a class="hero-contact-link" href="${SITE_DATA.portfolioUrl}" target="_blank"><div class="hero-contact-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>Portefølje</a>`);
  c.innerHTML = links.join('');
}

// ── INIT ──
buildFaq();
buildHeroContact();
buildWork();
buildTimeline();
buildSkills();
buildKontakt();

const io=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')}),{threshold:.15});
document.querySelectorAll('.fade-in').forEach(el=>io.observe(el));
const so=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.querySelectorAll('.skill-fill').forEach(b=>b.style.width=b.dataset.p+'%');so.unobserve(x.target)}})},{threshold:.3});
so.observe(document.getElementById('skillsWrap'));
</script>
</body>
</html>
