
<!DOCTYPE html>
<html lang="no">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--t1:#409f89;--t2:#2d7a68;--t3:#e3f4f0;--black:#111;--white:#fff;--bg:#F7F7F5;--card:#fff;--muted:#333;--font:'Nunito Sans','Myriad Pro',sans-serif}
body{font-family:var(--font);font-size:16px;color:var(--black);background:var(--bg);line-height:1.7}
nav{position:sticky;top:0;z-index:100;background:var(--white);display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:62px;box-shadow:0 1px 0 rgba(0,0,0,.07)}
.nav-logo{font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--black)}
.nav-logo span{color:var(--t1)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--t1)}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.burger span{display:block;width:22px;height:2px;background:var(--black);border-radius:2px}
.hero-outer{width:100%;background:#111;padding:48px 0}
.hero-inner{max-width:1060px;margin:0 auto;padding:0 48px}
.hero-video{width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:#000}
.hero-video iframe{width:100%;height:100%;border:none;display:block}
.hero-contact{display:flex;gap:28px;flex-wrap:wrap;padding:24px 0 8px;align-items:center}
.hero-contact-link{display:flex;align-items:center;gap:10px;text-decoration:none;color:rgba(255,255,255,.8);font-size:14px;transition:color .2s}
.hero-contact-link:hover{color:#fff}
.hero-contact-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hero-contact-icon svg{width:15px;height:15px;stroke:var(--t1);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.wrap{max-width:1060px;margin:0 auto;padding:0 48px}
.section{padding:36px 0}
.section-eyebrow{font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--t1);margin-bottom:8px}
.section-title{font-size:28px;font-weight:700;margin-bottom:8px}
.section-intro{font-size:16px;color:var(--muted);line-height:1.7;margin-bottom:20px}
.faq-section{background:var(--white);padding:0 0 32px}
.faq-list{max-width:1060px;margin:0 auto;padding:0 48px}
.faq-item{border-bottom:1px solid rgba(0,0,0,.07)}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:20px 0;cursor:pointer;gap:16px;font-size:17px;font-weight:700;transition:color .2s;color:var(--black)}
.faq-q:hover{color:var(--t1)}
.faq-q-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.faq-type-icon{flex-shrink:0;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:#B8E5D9}
.faq-type-icon svg{width:13px;height:13px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;stroke:#409f89}
.faq-q-text{flex:1}
.faq-chevron{width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .3s}
.faq-item.open .faq-chevron{background:var(--t1);transform:rotate(180deg)}
.faq-chevron svg{width:12px;height:12px;stroke:var(--muted);fill:none;stroke-width:2.5;stroke-linecap:round;transition:stroke .2s}
.faq-item.open .faq-chevron svg{stroke:#fff}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease}
.faq-item.open .faq-a{max-height:3000px}
.faq-a-inner{padding:4px 0 28px 40px;font-size:15px;color:var(--muted);line-height:1.8}

/* QUOTE KARUSELL */
.quote-carousel{margin-top:16px}

.quote-slide{margin-bottom:12px}
.quote-card{background:var(--t3);border-radius:16px;padding:28px 28px 24px}
.quote-mark{font-size:64px;line-height:0.8;color:var(--t1);font-weight:700;margin-bottom:8px;font-family:Georgia,serif}
.quote-text{font-size:16px;color:var(--black);line-height:1.7;margin-bottom:20px}
.quote-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.quote-name{font-size:14px;font-weight:700;color:var(--black)}
.quote-role{font-size:13px;color:var(--t2)}
.video-card{background:var(--t3);border-radius:16px;padding:28px 28px 24px}
.video-card iframe{width:100%;aspect-ratio:16/9;border:none;display:block;border-radius:10px}
.video-card-footer{padding:16px 0 0}
.video-card-name{font-size:14px;font-weight:700;color:var(--black)}
.video-card-role{font-size:13px;color:var(--t2)}
.quote-controls{display:flex;align-items:center;gap:10px;margin-top:12px}
.quote-btn{width:30px;height:30px;border-radius:50%;background:var(--card);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.quote-btn:hover{background:var(--t1)}
.quote-btn:hover svg path{stroke:#fff}
.quote-dots{display:flex;gap:5px;flex:1}
.quote-dot{width:6px;height:6px;border-radius:3px;background:#ddd;cursor:pointer;transition:background .2s,width .25s}
.quote-dot.active{width:16px;background:var(--t1)}
.quote-count{font-size:11px;color:var(--muted);white-space:nowrap}

.carousel{border-radius:10px;overflow:hidden;background:var(--bg);margin-top:12px}
.carousel-track{display:flex;transition:transform .4s cubic-bezier(.25,1,.5,1)}
.carousel-slide{min-width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;overflow:hidden}
.carousel-slide img{width:100%;height:100%;object-fit:cover}
.carousel-slide iframe{width:100%;height:100%;border:none}
.slide-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.slide-num{font-size:32px;font-weight:300;color:var(--t1)}
.slide-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.car-controls{display:flex;align-items:center;gap:10px;margin-top:10px}
.car-btn{width:30px;height:30px;border-radius:50%;background:var(--card);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.car-btn:hover{background:var(--t1)}
.car-btn:hover svg path{stroke:#fff}
.car-dots{display:flex;gap:5px;flex:1}
.car-dot{width:6px;height:6px;border-radius:3px;background:#ddd;cursor:pointer;transition:background .2s,width .25s}
.car-dot.active{width:16px;background:var(--t1)}
.car-count{font-size:11px;color:var(--muted);white-space:nowrap}
.media-small{max-width:50%;margin:12px 0}
.media-small iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:10px;display:block}
.media-caption{font-size:13px;color:var(--muted);margin-top:8px;font-style:italic}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
.timeline-wrap{background:var(--card);border-radius:14px;padding:36px}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:4px;top:6px;bottom:0;width:2px;background:var(--t3);border-radius:2px}
.tl-item{position:relative;margin-bottom:28px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-24px;top:7px;width:10px;height:10px;border-radius:50%;background:var(--t1);border:2px solid var(--white)}
.tl-year{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--t2);margin-bottom:2px}
.tl-role{font-size:16px;font-weight:700}
.tl-place{font-size:14px;color:#333;margin-bottom:4px}
.tl-desc{font-size:15px;color:#333;line-height:1.6}
.skills-wrap{background:var(--card);border-radius:14px;padding:36px}
.skill-row{margin-bottom:18px}
.skill-row:last-child{margin-bottom:0}
.skill-name{font-size:14px;font-weight:700;margin-bottom:6px}
.skill-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.skill-fill{height:100%;background:linear-gradient(90deg,var(--t1),var(--t2));width:0;border-radius:3px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
footer{background:var(--black);color:rgba(255,255,255,.4);padding:28px 48px;display:flex;justify-content:space-between;align-items:center;font-size:13px;flex-wrap:wrap;gap:8px}
footer strong{color:var(--t1)}
footer a{color:rgba(255,255,255,.4);text-decoration:none}
footer a:hover{color:var(--t1)}
.fade-in{opacity:0;transform:translateY(12px);transition:opacity .6s,transform .6s}
.fade-in.visible{opacity:1;transform:none}
@media(max-width:900px){.two-col{grid-template-columns:1fr;gap:24px}}
@media(max-width:640px){nav{padding:0 20px}.wrap{padding:0 20px}.faq-list{padding:0 20px}.hero-inner{padding:0 20px}.nav-links{display:none;flex-direction:column;position:absolute;top:62px;left:0;right:0;background:#fff;padding:16px 20px;gap:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}.nav-links.open{display:flex}.burger{display:flex}.section{padding:36px 0}.faq-a-inner{padding-left:0}.media-small{max-width:100%}footer{padding:24px 20px}}
</style>
</head>

<script>
// ── QUOTE KARUSELL DATA ──
const referanser = [
  {
    type: "quote",
    text: "Jeg har hatt den store gleden av å samarbeide med Randi, som utvikler i VG i 4 år. Randi er faglig sterk, kreativ, produktiv og en særdeles trivelig person å jobbe med. Hun forstår det tekniske innen webutvikling og har derfor vært en meget god samarbeidspartner.",
    name: "Simen Lysebo",
    role: "Fullstack-utvikler, TV 2 — Tidligere kollega fra VG"
  },
  {
    type: "quote",
    text: "Randi er en man alltid er glad for å være på lag med, og jeg var så heldig at jeg var med på hennes i tre år i Allente. Snakk om driv og gjennomføringsevne, men også en helt egen evne til å stille opp for kollegaer. Randi deler raust, både av kunnskap, personlighet og omsorg.",
    name: "Benedicte Norderhaug",
    role: "Content Producer, Allente — Tidligere kollega i Allente"
  },
  {
    type: "quote",
    text: "Hvis jeg må velge meg én favoritt gjennom tidene ... da velger jeg Randi. Åpent, løsningsorientert hode med idésterk, kreativ kraft som alltid leverer over forventet — og en nydelig, omtenksom og varm personlighet som alle bare elsker å jobbe med.",
    name: "Trine Grann",
    role: "Tekstforfatter — Tidligere kollega i Allente"
  },
  {
    type: "video",
    youtubeId: "ToDBqyfMAZ8",
    name: "Maren",
    role: "Datter"
  },
  {
    type: "video",
    youtubeId: "zRPfw77rPys",
    name: "Kristoffer",
    role: "Sønn"
  }
];

let quoteIdx = 0;

function buildQuoteCarousel(){
  const slides = referanser.map((r,i) => {
    let inner = '';
    if(r.type === 'quote') inner = `<div class="quote-card"><div class="quote-mark">"</div><div class="quote-text">${r.text}</div><div class="quote-footer"><div><div class="quote-name">${r.name}</div><div class="quote-role">${r.role}</div></div></div></div>`;
    else inner = `<div class="video-card"><iframe src="https://www.youtube.com/embed/${r.youtubeId}?rel=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe><div class="video-card-footer"><div class="video-card-name">${r.name}</div><div class="video-card-role">${r.role}</div></div></div>`;
    return `<div class="quote-slide" id="qs${i}" style="display:${i===0?'block':'none'}">${inner}</div>`;
  }).join('');
  const dots = referanser.map((_,i) => `<div class="quote-dot${i===0?' active':''}" onclick="goQuote(${i})"></div>`).join('');
  return `<div class="quote-carousel">${slides}<div class="quote-controls"><button class="quote-btn" onclick="stepQuote(-1)"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="quote-dots" id="quoteDots">${dots}</div><button class="quote-btn" onclick="stepQuote(1)"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="quote-count" id="quoteCount">1 / ${referanser.length}</div></div></div>`;
}

function goQuote(idx){
  referanser.forEach((_,i)=>{const el=document.getElementById('qs'+i);if(el)el.style.display=i===idx?'block':'none';});
  document.querySelectorAll('.quote-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  const c=document.getElementById('quoteCount');if(c)c.textContent=`${idx+1} / ${referanser.length}`;
  quoteIdx=idx;
}
function stepQuote(dir){goQuote((quoteIdx+dir+referanser.length)%referanser.length)}

// ── CAROUSEL ──
const carState={};
function makeCarousel(items,id){
  carState[id]={total:items.length,current:0};
  const slides=items.map((item,i)=>{
    if(item.type==='image') return`<div class="carousel-slide"><img src="${item.src}" alt="${item.label||''}"></div>`;
    if(item.type==='video'&&item.vimeoId) return`<div class="carousel-slide"><iframe src="https://player.vimeo.com/video/${item.vimeoId}?badge=0&autopause=0&title=0&byline=0&portrait=0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div>`;
    if(item.type==='youtube'&&item.youtubeId) return`<div class="carousel-slide"><iframe src="https://www.youtube.com/embed/${item.youtubeId}?rel=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
    return`<div class="carousel-slide"><div class="slide-placeholder" style="background:${item.bg||'#e3f4f0'}"><div class="slide-num">${String(i+1).padStart(2,'0')}</div><div class="slide-lbl">${item.label||''}</div></div></div>`;
  }).join('');
  const dots=items.map((_,i)=>`<div class="car-dot${i===0?' active':''}" onclick="goSlide('${id}',${i})"></div>`).join('');
  const controls=items.length>1?`<div class="car-controls"><button class="car-btn" onclick="stepSlide('${id}',-1)"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="car-dots" id="${id}dots">${dots}</div><button class="car-btn" onclick="stepSlide('${id}',1)"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="car-count" id="${id}count">1 / ${items.length}</div></div>`:'';
  return`<div class="carousel" id="${id}"><div class="carousel-track" id="${id}track">${slides}</div></div>${controls}`;
}
function goSlide(id,idx){carState[id].current=idx;document.getElementById(id+'track').style.transform=`translateX(-${idx*100}%)`;document.querySelectorAll(`#${id}dots .car-dot`).forEach((d,i)=>d.classList.toggle('active',i===idx));document.getElementById(id+'count').textContent=`${idx+1} / ${carState[id].total}`}
function stepSlide(id,dir){const s=carState[id];goSlide(id,(s.current+dir+s.total)%s.total)}

// ── FAQ ──
const fikenQA = [
  {q:"Så… hvem er du da?",type:"video",text:"Jeg er Randi. Erfaren og allsidig grafisk designer. Kreativ. Humørfylt. Leken. Nyskjerrig. Arbeidsom. Positiv. Og mamma, kjæreste og hundeeier.<br><br>Lær mer om meg her, i denne animasjonsvideoen jeg har laget:",media:[{type:"video",vimeoId:"1187345684"}]},
  {q:"Og hvorfor søker du på denne jobben?",type:"text",text:"Altså, den stillingsannonsen deres traff meg virkelig. Jeg digger måten dere tenker på om at det man holder på med skal være gøy, at man selv har ansvar for å se hva som trengs å gjøres, at det er rom for å teste nye ting, og alt det. Dere virker som en herlig gjeng, og at det er uhøytidelig og høyt under taket på jobb, er noe jeg setter stor pris på.<br><br>Og så kan jeg gjøre alt det dere etterspør! Med erfaring fra både in-house byrå og markedsavdeling, har jeg call på dette med å bygge merkevare, altså!",media:[]},
  {q:"Hva sier andre om deg?",type:"video",text:"Jeg har spurt litt rundt, jeg. Her er hva tidligere kollegaer og familie sier om meg:",quoteCarousel:true},
  {q:"Er du rå på regnskap da?",type:"text",text:"Hehe, nei… På russekortet mitt sto det: <em>«Det finnes tre typer mennesker. De som kan telle, og de som ikke kan det»</em>.<br><br>Jeg er jo akkurat den type menneske som absolutt trenger Fiken! Så da kan jeg jo sette meg lett inn i hva man trenger hjelp med, og forsøke å forklare det til nettopp sånne som meg. Jeg liker å visualisere komplekse ting, så de blir lettere å forstå.",media:[]},
  {q:"Er du god til å designe annonser?",type:"video",text:"Ja! Det har jeg masse erfaring med fra tiden min i VG, der det var alt vi gjorde, lage kreative annonser for VG sine annonsører. Og så har jeg laget mye markedsmateriell i Allente også, for mange ulike kanaler.",media:[],extraHtml:`<div class="quote-carousel" style="margin-top:16px">
  <div id="ad0" class="ad-slide" style="display:block"><div class="video-card"><iframe src="https://player.vimeo.com/video/1188869881?badge=0&autopause=0&title=0&byline=0&portrait=0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe><div class="video-card-footer"><div class="video-card-name">Annonse for Axo Finans</div><div class="video-card-role">Irriterende smålån</div></div></div></div>
  <div id="ad1" class="ad-slide" style="display:none"><div class="video-card"><iframe src="https://player.vimeo.com/video/1188869866?badge=0&autopause=0&title=0&byline=0&portrait=0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe><div class="video-card-footer"><div class="video-card-name">Annonse for Babylife Clinic</div><div class="video-card-role">En chattetjeneste for nybakte mødre</div></div></div></div>
  <div id="ad2" class="ad-slide" style="display:none"><div class="video-card" style="padding:28px 28px 24px"><img src="images/Axo_Finans.png" style="width:100%;border-radius:10px;display:block"><div class="video-card-footer"><div class="video-card-name">Axo Finans</div><div class="video-card-role">Annonsemateriell</div></div></div></div>
